<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lock.js" defer></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary:   #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary:  #76746E;
  --font:      -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: 0 20px 60px;
}

/* Drifting ambient glow */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118,  88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
/* Dot texture */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

/* Gradient title — identical to other pages */
.dash-title {
  margin: 0 0 20px;
  font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento grid ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

/* Size modifiers */
.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

/* Base tile — glass card */
.tile {
  --accent: #FAFAFA;
  display: flex; flex-direction: column;
  padding: 18px 20px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.07);
  background: linear-gradient(160deg,
    rgba(255,255,255,0.048) 0%,
    rgba(255,255,255,0.016) 100%);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 2px 10px rgba(0,0,0,0.28);
  text-decoration: none;
  position: relative; overflow: hidden;
  transition:
    transform    0.20s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.20s,
    box-shadow   0.20s;
  -webkit-tap-highlight-color: transparent;
}
/* Subtle top sheen */
.tile::before {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: radial-gradient(ellipse 85% 55% at 50% 0%, rgba(255,255,255,0.045), transparent 68%);
  pointer-events: none;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 32%, transparent);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 14px 44px rgba(0,0,0,0.42),
    0 0 0 1px color-mix(in srgb, var(--accent) 10%, transparent);
}
.tile:active { transform: translateY(-1px); }

/* Tile anatomy */
.tile-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.tile-num {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--text-tertiary);
}
.tile-emoji {
  font-size: 28px; line-height: 1;
  filter: drop-shadow(0 0 10px var(--accent));
}
.tile.big .tile-emoji { font-size: 36px; }

.tile-spacer { flex: 1; min-height: 6px; }

.tile-title {
  font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 5px;
}
.tile.big .tile-title { font-size: 22px; margin-bottom: 8px; }

.tile-footer {
  display: flex; justify-content: space-between; align-items: center;
}
.tile-sub {
  font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.01em;
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-right: 8px;
}
.tile.big .tile-sub { font-size: 12px; }
.tile-arrow {
  font-size: 14px; font-weight: 700;
  color: var(--accent); flex-shrink: 0;
  transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
}
.tile:hover .tile-arrow { transform: translateX(5px); }

/* ── Responsive ─────────────────────────────────── */

/* Tablet: 2 columns, big loses extra row height */
@media (max-width: 720px) {
  .bento {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 148px;
    gap: 12px;
  }
  .tile.big { grid-column: span 2; grid-row: span 1; }
}

/* Mobile: single column */
@media (max-width: 440px) {
  .bento {
    grid-template-columns: 1fr;
    grid-auto-rows: 128px;
    gap: 10px;
  }
  .tile.big, .tile.wide { grid-column: span 1; }
}

@media (max-width: 480px) {
  body { padding: 0 14px 50px; }
  .tile { padding: 15px 16px; }
  .tile-emoji { font-size: 24px; }
  .tile.big .tile-emoji { font-size: 30px; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Dashboard</h1>

  <div class="bento">

    <!-- ·01 Main — big (2×2) -->
    <a href="main.html" class="tile big" style="--accent:#6BE3A4">
      <div class="tile-top">
        <span class="tile-num">·01</span>
        <span class="tile-emoji">🏠</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals & daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·02 Fitness — wide (2×1) -->
    <a href="gym.html" class="tile wide" style="--accent:#7DD3FC">
      <div class="tile-top">
        <span class="tile-num">·02</span>
        <span class="tile-emoji">💪</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·03 Health — small (1×1) -->
    <a href="health.html" class="tile" style="--accent:#A7F3D0">
      <div class="tile-top">
        <span class="tile-num">·03</span>
        <span class="tile-emoji">💊</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements & vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·04 Water — small (1×1) -->
    <a href="po-water.html" class="tile" style="--accent:#60A5FA">
      <div class="tile-top">
        <span class="tile-num">·04</span>
        <span class="tile-emoji">💧</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·05 Finance — wide (2×1) -->
    <a href="finance.html" class="tile wide" style="--accent:#F2C063">
      <div class="tile-top">
        <span class="tile-num">·05</span>
        <span class="tile-emoji">📊</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth & spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>

</div>
</body>
</html>
